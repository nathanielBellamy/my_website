<div class="infinite-scroll-container flex flex-col items-center w-full space-y-8" (scroll)="onScroll($event)">
  @for (item of items(); track $index) {
    <div class="w-full max-w-3xl px-4">
      <ng-container
        [ngTemplateOutlet]="itemTemplate()"
        [ngTemplateOutletContext]="{ $implicit: item }"
      ></ng-container>
    </div>
  }

  @if (error()) {
    <div class="error-message">
      <p>Error: {{ error() }}</p>
    </div>
  }

  @if (loading()) {
    <div class="loading-indicator">
      <p>Loading...</p>
    </div>
  }

  @if (allLoaded()) {
    <div class="all-loaded-indicator">
      <p>All items loaded.</p>
    </div>
  }
</div>
