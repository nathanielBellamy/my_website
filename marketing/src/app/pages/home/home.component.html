<div class="container mx-auto p-4">
  @if (store.loading()) {
    <p>Loading...</p>
  } @else if (store.error()) {
    <p>Error: {{ store.error() }}</p>
  } @else {
    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
      @for (item of store.content(); track item.id) {
        <app-card
          [title]="item.title"
          [content]="item.body"
        />
      }
    </div>
  }
</div>
