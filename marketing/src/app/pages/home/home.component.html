<div class="h-full">
  <app-infinite-scroll
    [items]="store.content()"
    [loading]="store.loading()"
    [allLoaded]="store.allLoaded()"
    (scrolled)="onScroll()"
    [itemTemplate]="itemTmpl"
  ></app-infinite-scroll>
</div>

<ng-template #itemTmpl let-item>
  <app-card [title]="item.Title" [content]="item.Content"></app-card>
</ng-template>
