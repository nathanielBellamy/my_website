<div class="container mx-auto p-4">
  @if (store.loading()) {
    <p>Loading...</p>
  } @else if (store.error()) {
    <p>Error: {{ store.error() }}</p>
  } @else {
    @for (item of store.content(); track item.id) {
      <div class="mb-4">
        <h2 class="text-2xl font-bold">{{ item.title }}</h2>
        <p>{{ item.body }}</p>
      </div>
    }
  }
</div>
