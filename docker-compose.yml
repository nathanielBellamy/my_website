services:
  postgres-db:
    platform: linux/arm64
    image: postgres:18
    container_name: my_website_db
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -q -d $$POSTGRES_DB -U $$POSTGRES_USER"]
      interval: 5s
      retries: 5
      start_period: 30s
      timeout: 5s
    networks:
      - default
      - monitoring

  backend:
    platform: linux/arm64
    build:
      context: .
      dockerfile: docker/Dockerfile
      args:
        MODE: ${MODE:-localhost}
    container_name: my_website_backend
    ports:
      - "8080:8080"
    depends_on:
      postgres-db:
        condition: service_healthy
    volumes:
      - ./uploads:/app/uploads
      - ./log:/app/log
    env_file:
      - .env/.env.localhost
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres-db:5432/${POSTGRES_DB}?sslmode=disable
      MODE: ${MODE:-localhost}
      ENABLE_AUTH_LOCAL: ${ENABLE_AUTH_LOCAL:-false}
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - default
      - monitoring

  prometheus:
    platform: linux/arm64
    image: prom/prometheus:latest
    container_name: my_website_prometheus
    volumes:
      - ./docker/monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.retention.time=15d'
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:9090/-/healthy"]
      interval: 10s
      retries: 3
      timeout: 5s
    networks:
      - monitoring

  node_exporter:
    platform: linux/arm64
    image: prom/node-exporter:latest
    container_name: my_website_node_exporter
    pid: host
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - '--path.procfs=/host/proc'
      - '--path.sysfs=/host/sys'
      - '--path.rootfs=/rootfs'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:9100/metrics"]
      interval: 10s
      retries: 3
      timeout: 5s
    networks:
      - monitoring

  loki:
    platform: linux/arm64
    image: grafana/loki:latest
    container_name: my_website_loki
    volumes:
      - ./docker/monitoring/loki/loki-config.yml:/etc/loki/loki-config.yml:ro
      - loki_data:/loki
    command: -config.file=/etc/loki/loki-config.yml
    networks:
      - monitoring

  promtail:
    platform: linux/arm64
    image: grafana/promtail:latest
    container_name: my_website_promtail
    volumes:
      - ./docker/monitoring/promtail/promtail-config.yml:/etc/promtail/promtail-config.yml:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - ./log:/var/log/app:ro
    command: -config.file=/etc/promtail/promtail-config.yml
    depends_on:
      loki:
        condition: service_started
    networks:
      - monitoring

  grafana:
    platform: linux/arm64
    image: grafana/grafana:latest
    container_name: my_website_grafana
    volumes:
      - ./docker/monitoring/grafana/grafana.ini:/etc/grafana/grafana.ini:ro
      - ./docker/monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana_data:/var/lib/grafana
    environment:
      GF_SMTP_HOST: ${SMTP_HOST:-localhost:587}
      GF_SMTP_USER: ${SMTP_USER:-}
      GF_SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      GF_SMTP_FROM_ADDRESS: ${SMTP_FROM:-noreply@nateschieber.dev}
    depends_on:
      prometheus:
        condition: service_healthy
      loki:
        condition: service_started
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3000/api/health"]
      interval: 10s
      retries: 3
      timeout: 5s
    networks:
      - monitoring

volumes:
  postgres_data:
  prometheus_data:
  loki_data:
  grafana_data:

networks:
  monitoring:
    driver: bridge

