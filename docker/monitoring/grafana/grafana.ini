[server]
root_url = %(protocol)s://%(domain)s/grafana/
serve_from_sub_path = true
http_port = 3000

[auth]
disable_login_form = true

[auth.proxy]
enabled = true
header_name = X-WEBAUTH-USER
header_property = username
auto_sign_up = true
whitelist =

[auth.anonymous]
enabled = false

[smtp]
enabled = true
host = ${SMTP_HOST}:${SMTP_PORT}
user = ${SMTP_USER}
password = ${SMTP_PASS}
from_address = ${SMTP_USER}
from_name = NateSchieber.dev Monitoring

[alerting]
enabled = true

[unified_alerting]
enabled = true

[security]
admin_user = admin
admin_password = admin
allow_embedding = true

[log]
mode = console
level = info
