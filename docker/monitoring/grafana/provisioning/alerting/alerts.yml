apiVersion: 1

contactPoints:
  - orgId: 1
    name: email-alerts
    receivers:
      - uid: email-1
        type: email
        settings:
          addresses: ${ADMIN_EMAIL}
          singleEmail: true
        disableResolveMessage: false

policies:
  - orgId: 1
    receiver: email-alerts
    group_by: ['alertname']
    group_wait: 30s
    group_interval: 5m
    repeat_interval: 4h

groups:
  - orgId: 1
    name: system-alerts
    folder: alerts
    interval: 1m
    rules:
      - uid: high-error-rate
        title: High Error Rate
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: loki
            model:
              expr: 'sum(count_over_time({job="docker"} | json | level = `error` [1m]))'
              refId: A
          - refId: C
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: __expr__
            model:
              type: threshold
              expression: A
              conditions:
                - evaluator:
                    type: gt
                    params: [10]
                  operator:
                    type: and
                  reducer:
                    type: last
              refId: C
        for: 5m
        annotations:
          summary: "Error rate exceeds 10 errors/min for 5 minutes"
        labels:
          severity: critical

      - uid: high-memory-usage
        title: High Memory Usage
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 600
              to: 0
            datasourceUid: prometheus
            model:
              expr: '(1 - (node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes)) * 100'
              refId: A
          - refId: C
            relativeTimeRange:
              from: 600
              to: 0
            datasourceUid: __expr__
            model:
              type: threshold
              expression: A
              conditions:
                - evaluator:
                    type: gt
                    params: [85]
                  operator:
                    type: and
                  reducer:
                    type: last
              refId: C
        for: 10m
        annotations:
          summary: "VM memory usage exceeds 85% for 10 minutes"
        labels:
          severity: warning

      - uid: high-disk-usage
        title: High Disk Usage
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: prometheus
            model:
              expr: '(1 - (node_filesystem_avail_bytes{mountpoint="/"} / node_filesystem_size_bytes{mountpoint="/"})) * 100'
              refId: A
          - refId: C
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: __expr__
            model:
              type: threshold
              expression: A
              conditions:
                - evaluator:
                    type: gt
                    params: [90]
                  operator:
                    type: and
                  reducer:
                    type: last
              refId: C
        for: 5m
        annotations:
          summary: "Disk usage exceeds 90% for 5 minutes"
        labels:
          severity: critical

      - uid: backend-down
        title: Backend Down
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 120
              to: 0
            datasourceUid: prometheus
            model:
              expr: 'up{job="backend"}'
              refId: A
          - refId: C
            relativeTimeRange:
              from: 120
              to: 0
            datasourceUid: __expr__
            model:
              type: threshold
              expression: A
              conditions:
                - evaluator:
                    type: lt
                    params: [1]
                  operator:
                    type: and
                  reducer:
                    type: last
              refId: C
        for: 2m
        annotations:
          summary: "Backend service is unreachable for 2 minutes"
        labels:
          severity: critical
