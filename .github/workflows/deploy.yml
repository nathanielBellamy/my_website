name: Deploy

on:
  push:
    branches:
      - develop
      - main

jobs:
  deploy:
    name: Deploy to ${{ github.ref_name == 'main' && 'Production' || 'Development' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker Image
        run: |
          # Build for linux/amd64 since our target servers are standard Linux VMs
          docker build --platform linux/amd64 -t my_website_backend:latest -f docker/Dockerfile .

      - name: Setup SSH Key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa

      - name: Generate .env file
        env:
          ENV_FILE_CONTENT: ${{ github.ref_name == 'main' && secrets.PROD_ENV_FILE || secrets.DEV_ENV_FILE }}
        run: |
          echo "$ENV_FILE_CONTENT" > .env

      - name: Deploy to Development
        if: github.ref == 'refs/heads/develop'
        run: |
          ./lifecycle/deploy-image.sh "${{ secrets.SSH_USER }}" "${{ secrets.SSH_HOST_DEV }}" ~/.ssh/id_rsa "develop"

      - name: Deploy to Production
        if: github.ref == 'refs/heads/main'
        run: |
          ./lifecycle/deploy-image.sh "${{ secrets.SSH_USER }}" "${{ secrets.SSH_HOST_PROD }}" ~/.ssh/id_rsa "production"
