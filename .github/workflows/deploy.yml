name: Deploy

on:
  push:
    branches:
      - develop
      - main

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  test:
    name: Tests & E2E
    uses: ./.github/workflows/ci.yml

  security:
    name: Security Scans
    uses: ./.github/workflows/security.yml

  deploy:
    name: Deploy to ${{ github.ref_name == 'main' && 'Production' || 'Development' }}
    needs: [test, security]
    runs-on: ubuntu-latest
    environment: 
      name: ${{ github.ref_name == 'main' && 'production' || 'development' }}
    steps:
      - uses: actions/checkout@v4

      - name: Generate .env file
        env:
          ENV_FILE_CONTENT: ${{ github.ref_name == 'main' && secrets.PROD_ENV_FILE || secrets.DEV_ENV_FILE }}
        run: |
          mkdir -p .env
          echo "$ENV_FILE_CONTENT" > .env/.env.production

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker Image
        run: |
          # Build for linux/amd64 since our target servers are standard Linux VMs
          # MODE=prod for all deploys: Angular production config + .env.production (populated per-branch from secrets)
          docker build --platform linux/amd64 --build-arg MODE=prod -t my_website_backend:latest -f docker/Dockerfile .

      - name: Setup SSH Key
        env:
          SSH_KEY: ${{ github.ref_name == 'main' && secrets.SSH_PRIVATE_KEY_PROD || secrets.SSH_PRIVATE_KEY_DEV }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_KEY" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa

      - name: Deploy to Development
        if: github.ref == 'refs/heads/develop'
        run: |
          ./lifecycle/deploy-image.sh "${{ secrets.SSH_USER }}" "${{ secrets.SSH_HOST_DEV }}" ~/.ssh/id_rsa "develop"

      - name: Deploy to Production
        if: github.ref == 'refs/heads/main'
        run: |
          ./lifecycle/deploy-image.sh "${{ secrets.SSH_USER }}" "${{ secrets.SSH_HOST_PROD }}" ~/.ssh/id_rsa "production"

  version:
    name: Tag Release Version
    needs: [deploy]
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine Version Bump
        id: bump
        run: |
          COMMIT_MSG=$(git log -1 --pretty=%B)
          echo "Commit message: $COMMIT_MSG"

          if echo "$COMMIT_MSG" | grep -qi '\[major\]'; then
            echo "type=major" >> $GITHUB_OUTPUT
          elif echo "$COMMIT_MSG" | grep -qi '\[minor\]'; then
            echo "type=minor" >> $GITHUB_OUTPUT
          else
            echo "type=patch" >> $GITHUB_OUTPUT
          fi

      - name: Calculate and Tag Version
        id: tag
        env:
          BUMP_TYPE: ${{ steps.bump.outputs.type }}
        run: |
          LATEST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
          echo "Latest tag: $LATEST_TAG"
          echo "Bump type: $BUMP_TYPE"

          VERSION=${LATEST_TAG#v}
          IFS='.' read -r MAJOR MINOR PATCH <<< "$VERSION"

          case $BUMP_TYPE in
            major)
              MAJOR=$((MAJOR + 1))
              MINOR=0
              PATCH=0
              ;;
            minor)
              MINOR=$((MINOR + 1))
              PATCH=0
              ;;
            patch)
              PATCH=$((PATCH + 1))
              ;;
          esac

          NEW_VERSION="v${MAJOR}.${MINOR}.${PATCH}"
          LATEST_MAJOR="v${MAJOR}.0.0"
          echo "New version: $NEW_VERSION"
          echo "version=$NEW_VERSION" >> $GITHUB_OUTPUT
          echo "latest_major=$LATEST_MAJOR" >> $GITHUB_OUTPUT

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "$NEW_VERSION" -m "Release $NEW_VERSION"
          git push origin "$NEW_VERSION"

      - name: Update version.ts
        env:
          NEW_VERSION: ${{ steps.tag.outputs.version }}
          LATEST_MAJOR: ${{ steps.tag.outputs.latest_major }}
        run: |
          printf 'export const version_current: string = "%s"\nexport const version_latest_major: string = "%s"\n' "$NEW_VERSION" "$LATEST_MAJOR" > version.ts

          git add version.ts
          git commit -m "chore: bump version to ${NEW_VERSION} [skip ci]"
          git push origin main
