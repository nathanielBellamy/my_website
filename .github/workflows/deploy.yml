name: Deploy

on:
  push:
    branches:
      - develop
      - main

jobs:
  test:
    name: Tests & E2E
    uses: ./.github/workflows/ci.yml

  security:
    name: Security Scans
    uses: ./.github/workflows/security.yml

  deploy:
    name: Deploy to ${{ github.ref_name == 'main' && 'Production' || 'Development' }}
    needs: [test, security]
    runs-on: ubuntu-latest
    environment: 
      name: ${{ github.ref_name == 'main' && 'production' || 'development' }}
    steps:
      - uses: actions/checkout@v4

      - name: Generate .env file
        env:
          ENV_FILE_CONTENT: ${{ github.ref_name == 'main' && secrets.PROD_ENV_FILE || secrets.DEV_ENV_FILE }}
        run: |
          mkdir -p .env
          echo "$ENV_FILE_CONTENT" > .env/.env.production

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker Image
        run: |
          # Build for linux/amd64 since our target servers are standard Linux VMs
          # MODE=prod for all deploys: Angular production config + .env.production (populated per-branch from secrets)
          docker build --platform linux/amd64 --build-arg MODE=prod -t my_website_backend:latest -f docker/Dockerfile .

      - name: Setup SSH Key
        env:
          SSH_KEY: ${{ github.ref_name == 'main' && secrets.SSH_PRIVATE_KEY_PROD || secrets.SSH_PRIVATE_KEY_DEV }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_KEY" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa

      - name: Deploy to Development
        if: github.ref == 'refs/heads/develop'
        run: |
          ./lifecycle/deploy-image.sh "${{ secrets.SSH_USER }}" "${{ secrets.SSH_HOST_DEV }}" ~/.ssh/id_rsa "develop"

      - name: Deploy to Production
        if: github.ref == 'refs/heads/main'
        run: |
          ./lifecycle/deploy-image.sh "${{ secrets.SSH_USER }}" "${{ secrets.SSH_HOST_PROD }}" ~/.ssh/id_rsa "production"

  post-release-e2e:
    name: Post-Release E2E Smoke Tests
    needs: [deploy]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: write
    environment:
      name: ${{ github.ref_name == 'main' && 'production' || 'development' }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: e2e/package-lock.json

      - name: Create Environment File
        env:
          ENV_FILE_CONTENT: ${{ github.ref_name == 'main' && secrets.PROD_ENV_FILE || secrets.DEV_ENV_FILE }}
        run: |
          mkdir -p .env
          echo "$ENV_FILE_CONTENT" > .env/.env.e2e

      - name: Install E2E dependencies
        run: cd e2e && npm ci

      - name: Run Marketing E2E Smoke Tests
        env:
          E2E_ENV: ${{ github.ref_name == 'main' && 'prod' || 'remotedev' }}
        run: |
          ./lifecycle/e2e.sh \
            --env "$E2E_ENV" \
            --spec "cypress/e2e/marketing.cy.js,cypress/e2e/marketing-blog.cy.js,cypress/e2e/navbar-sticky.cy.js,cypress/e2e/rate-limit.cy.js"

      - name: Upload Cypress Screenshots
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-test-screenshots
          path: e2e/cypress/screenshots

      - name: Upload Cypress Videos
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-test-videos
          path: e2e/cypress/videos
