name: Deploy

on:
  push:
    branches:
      - develop
      - main

jobs:
  test:
    name: Tests & E2E
    uses: ./.github/workflows/ci.yml

  security:
    name: Security Scans
    uses: ./.github/workflows/security.yml

  deploy:
    name: Deploy to ${{ github.ref_name == 'main' && 'Production' || 'Development' }}
    needs: [test, security]
    runs-on: ubuntu-latest
    environment: 
      name: ${{ github.ref_name == 'main' && 'production' || 'development' }}
    steps:
      - uses: actions/checkout@v4

      - name: Generate .env file
        env:
          ENV_FILE_CONTENT: ${{ github.ref_name == 'main' && secrets.PROD_ENV_FILE || secrets.DEV_ENV_FILE }}
        run: |
          mkdir -p .env
          echo "$ENV_FILE_CONTENT" > .env/.env.production

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker Image
        run: |
          # Build for linux/amd64 since our target servers are standard Linux VMs
          # MODE=prod for all deploys: Angular production config + .env.production (populated per-branch from secrets)
          docker build --platform linux/amd64 --build-arg MODE=prod -t my_website_backend:latest -f docker/Dockerfile .

      - name: Setup SSH Key
        env:
          SSH_KEY: ${{ github.ref_name == 'main' && secrets.SSH_PRIVATE_KEY_PROD || secrets.SSH_PRIVATE_KEY_DEV }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_KEY" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa

      - name: Deploy to Development
        if: github.ref == 'refs/heads/develop'
        run: |
          ./lifecycle/deploy-image.sh "${{ secrets.SSH_USER }}" "${{ secrets.SSH_HOST_DEV }}" ~/.ssh/id_rsa "develop"
          echo "📂 Syncing nixos/lifecycle to ~/deploy/lifecycle on remote..."
          ssh -o StrictHostKeyChecking=no -i ~/.ssh/id_rsa "${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST_DEV }}" "mkdir -p ~/deploy"
          scp -o StrictHostKeyChecking=no -i ~/.ssh/id_rsa -r nixos/lifecycle "${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST_DEV }}:~/deploy/"

      - name: Deploy to Production
        if: github.ref == 'refs/heads/main'
        run: |
          ./lifecycle/deploy-image.sh "${{ secrets.SSH_USER }}" "${{ secrets.SSH_HOST_PROD }}" ~/.ssh/id_rsa "production"
          echo "📂 Syncing nixos/lifecycle to ~/deploy/lifecycle on remote..."
          ssh -o StrictHostKeyChecking=no -i ~/.ssh/id_rsa "${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST_PROD }}" "mkdir -p ~/deploy"
          scp -o StrictHostKeyChecking=no -i ~/.ssh/id_rsa -r nixos/lifecycle "${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST_PROD }}:~/deploy/"
