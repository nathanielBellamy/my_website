<div class="container mx-auto p-4 bg-white shadow-md rounded-lg">
  @if (workContent()) {
    <h2 class="text-3xl font-semibold text-gray-800 mb-6">Edit Work Content</h2>
    <app-work-form [contentData]="workContent()" (submitForm)="updateContent($event)" (cancel)="goBack()"></app-work-form>
  } @else {
    <p class="text-gray-600 text-lg">Loading Work content...</p>
  }
</div>
