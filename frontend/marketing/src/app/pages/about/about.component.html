<app-page id="about-page">
  <div class="w-full px-4 sm:px-6 lg:px-8 mb-16 text-center" appScrollFadeIn>
    <h1 
      data-testid="about-header"
      class="font-heading text-5xl md:text-7xl font-bold text-heading-text mb-6">
      About Me
    </h1>
    <p class="font-sans text-xl text-body-text max-w-2xl mx-auto">
      Language Nerd. Music Enthusiast. Portland, OR.
    </p>
    <div class="h-1 w-12 bg-vibrant-yellow mt-8 mx-auto rounded-full"></div>
  </div>

  <app-infinite-scroll
    class="w-full"
    [items]="store.content()"
    [loading]="store.loading()"
    [allLoaded]="store.allLoaded()"
    (scrolled)="onScroll()"
    [itemTemplate]="itemTmpl"
    [error]="store.error()"
  ></app-infinite-scroll>
  <app-scroll-indicator target="/groovejr"></app-scroll-indicator>

  <ng-template #itemTmpl let-item>
    <app-card appScrollFadeIn [title]="item.title" [content]="item.content"></app-card>
  </ng-template>
</app-page>
