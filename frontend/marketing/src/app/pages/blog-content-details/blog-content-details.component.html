<div class="min-h-screen pt-16 pb-16 px-4 sm:px-6 lg:px-8 max-w-4xl mx-auto">
  <div class="mb-8">
    <a routerLink="/blog" class="text-primary-accent hover:text-primary-accent/80 transition-colors flex items-center gap-2 mb-4 font-medium">
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-5 h-5">
        <path stroke-linecap="round" stroke-linejoin="round" d="M10.5 19.5 3 12m0 0 7.5-7.5M3 12h18" />
      </svg>
      Back to Blog
    </a>
  </div>

  @if (loading()) {
    <div class="flex justify-center items-center h-64">
      <div class="animate-spin rounded-full h-12 w-12 border-t-2 border-b-2 border-primary-accent"></div>
    </div>
  } @else if (error()) {
    <div class="bg-red-500/10 border border-red-500 text-red-500 p-4 rounded-lg text-center">
      {{ error() }}
    </div>
  } @else if (blogPost(); as post) {
    <article class="bg-card border border-white/10 rounded-xl p-8 shadow-xl">
      <header class="mb-8 border-b border-white/10 pb-8">
        <div class="flex flex-wrap gap-2 mb-4">
          @for (tag of post.tags; track tag.id) {
            <span class="bg-primary-accent/10 text-primary-accent px-3 py-1 rounded-full text-sm font-semibold">
              #{{ tag.name }}
            </span>
          }
        </div>
        <h1 class="font-heading text-4xl md:text-5xl font-bold text-heading-text mb-4">
          {{ post.title }}
        </h1>
        <div class="text-body-text/60 text-sm flex items-center gap-4">
          <span>{{ post.createdAt | date:'longDate' }}</span>
          <span>•</span>
          <span>{{ post.author.name }}</span>
        </div>
      </header>

      <div class="prose prose-invert prose-lg max-w-none">
        <markdown [data]="post.content"></markdown>
      </div>
    </article>
  }
</div>
