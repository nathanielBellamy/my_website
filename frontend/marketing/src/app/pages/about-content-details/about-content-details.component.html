<div class="min-h-screen pt-24 pb-24 px-4 sm:px-6 lg:px-8 max-w-4xl mx-auto">
  <div
    class="mb-8"
    appScrollFadeIn>
    <a
      routerLink="/about"
      class="text-vibrant-yellow hover:text-vibrant-yellow/80 transition-colors flex items-center gap-2 mb-4 font-medium">
      <svg
        xmlns="http://www.w3.org/2000/svg"
        fill="none"
        viewBox="0 0 24 24"
        stroke-width="1.5"
        stroke="currentColor"
        class="w-5 h-5">
        <path
          stroke-linecap="round"
          stroke-linejoin="round"
          d="M10.5 19.5 3 12m0 0 7.5-7.5M3 12h18" />
      </svg>
      Back to About
    </a>
  </div>

  @if (loading() || error()) {
    <div
      class="flex justify-center items-center h-64"
      role="status"
      aria-label="Loading content">
      <div class="animate-spin rounded-full h-12 w-12 border-t-2 border-b-2 border-vibrant-yellow"></div>
    </div>
  } @else if (aboutContent(); as content) {
    <article
      class="bg-card border border-white/10 rounded-xl p-8 shadow-xl"
      appScrollFadeIn
      [delay]="200">
      <header class="mb-8 border-b border-white/10 pb-8">
        <h1
          data-testid="about-content-details-title"
          class="font-heading text-4xl md:text-5xl font-bold text-heading-text mb-4">
          {{ content.title }}
        </h1>
      </header>

      <div class="prose prose-invert prose-lg max-w-none">
        <markdown
          [data]="content.content"
          [disableSanitizer]="true"
        ></markdown>
      </div>
    </article>
  }
</div>
