<div
  id="all-sections"
  data-testid="all-sections"
  class="flex flex-col items-stretch justify-between gap-64 ">
  <section id="home" class="page-size" appScrollFadeIn>
    <app-home></app-home>
  </section>
  <section id="focus" class="page-size scroll-mt-24" appScrollFadeIn>
    <app-focus></app-focus>
  </section>
  <section id="latest-posts" class="page-size scroll-mt-24" appScrollFadeIn>
    <app-latest-posts></app-latest-posts>
  </section>
  <section id="about" class="page-size scroll-mt-24" appScrollFadeIn>
    <app-about></app-about>
  </section>
  <section id="groovejr" class="page-size scroll-mt-24" appScrollFadeIn>
    <app-groove-jr></app-groove-jr>
  </section>
  <section id="old-site-preview" class="page-size scroll-mt-24" appScrollFadeIn>
    @if (activeSection() === 'old-site-preview') {
      <app-old-site></app-old-site>
    } @else {
      <div class="w-full h-full flex flex-col items-center justify-center bg-primary-bg rounded-lg border border-primary-border opacity-50">
        <div class="w-12 h-12 border-4 border-secondary-accent border-t-transparent rounded-full animate-spin mb-4"></div>
        <p class="text-body-text font-medium text-lg">Loading WebGL Experience...</p>
      </div>
    }
  </section>
  <section id="blog" class="page-size scroll-mt-24" appScrollFadeIn>
    <app-blog></app-blog>
  </section>
</div>
