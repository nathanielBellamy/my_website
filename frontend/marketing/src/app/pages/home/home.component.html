<app-page id="home-page" >
  <span></span>
  <div class="
        size-full
        max-w-4xl mx-auto z-10 text-center text-balance 
        flex flex-col items-strech justify-between gap-4
        ">
      
    <div class="flex flex-col items-stretch">
      <h1 
        appScrollFadeIn
        [delay]="0"
        data-testid="hero-heading"
        class="font-heading text-5xl md:text-8xl font-bold tracking-tight text-white">
        <span class="bg-gradient-to-r from-white via-white to-primary-accent/50 text-transparent bg-clip-text pr-2">Nate</span>
        <span class="bg-gradient-to-r from-primary-accent/50 via-white to-white text-transparent bg-clip-text">Schieber</span>
      </h1>
      <div 
        appScrollFadeIn
        [delay]="200"
        class="h-2 w-24 bg-gradient-to-r from-primary-accent via-vibrant-orange to-secondary-accent mx-auto mt-6 rounded-full"></div>
      <h2 
        appScrollFadeIn
        [delay]="400"
        class="hidden md:block font-sans text-2xl md:text-4xl text-primary-accent mt-8 font-light">
        Code That's Easy To Work With
      </h2>
      <p 
        appScrollFadeIn
        [delay]="600"
        class="font-sans text-balance text-lg md:text-xl text-body-text mt-8 max-w-2xl mx-auto leading-relaxed">
        Building performant, robust, meaintainable systems. 
      </p>
      <div 
        appScrollFadeIn
        [delay]="800"
        class="mt-12 flex flex-row items-center justify-center gap-6">
        <a
          href="mailto:nbschieber@gmail.com"
          class="inline-block font-sans text-lg font-semibold text-white bg-gradient-to-r from-primary-accent to-secondary-accent py-4 px-10 rounded-xl shadow-xl shadow-primary-accent/20 hover:scale-105 transition-all duration-300"
        >
          Get In Touch
        </a>
        <a
          routerLink="/latest-posts"
          class="inline-block font-sans text-lg font-semibold text-body-text border border-white/10 py-4 px-10 rounded-xl hover:bg-white/5 transition-all duration-300"
        >
          Explore Work
        </a>
      </div>
    </div>
  </div>
  <app-scroll-indicator 
    target="/focus"
    appScrollFadeIn
    [delay]="1000"
    >
  </app-scroll-indicator>
</app-page>
