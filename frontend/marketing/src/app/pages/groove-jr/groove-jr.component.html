<app-page id="groovejr-page">

  <div 
    page-header
    class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 mb-16 text-center" appScrollFadeIn>
    <h1 
      data-testid="groovejr-header"
      class="font-heading text-5xl md:text-7xl font-bold text-heading-text mb-6">
      GrooveJr
    </h1>
    <p class="font-sans text-xl text-body-text max-w-2xl mx-auto">
      Music Player, Library, and VST3 Host
    </p>
    <div class="h-1 w-12 bg-vibrant-green mt-8 mx-auto rounded-full"></div>
  </div>

  <div
    page-body>
    <app-infinite-scroll
      class="w-full"
      [items]="store.content()"
      [loading]="store.loading()"
      [allLoaded]="store.allLoaded()"
      (scrolled)="onScroll()"
      [itemTemplate]="itemTmpl"
      [error]="store.error()"
    ></app-infinite-scroll>

    <ng-template #itemTmpl let-item>
      <app-card appScrollFadeIn [title]="item.title" [content]="item.content"></app-card>
    </ng-template>
  </div>
  <app-scroll-indicator
    page-footer
    target="/old-site-preview">
  </app-scroll-indicator>
</app-page>
