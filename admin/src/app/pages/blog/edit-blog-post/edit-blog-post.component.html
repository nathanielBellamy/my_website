<div class="container mx-auto p-4 bg-white shadow-md rounded-lg">
  <h2 class="text-3xl font-semibold text-gray-800 mb-6">Edit Blog Post</h2>
  @if (blogPost()) {
    <app-blog-form [post]="blogPost()" (submitForm)="updatePost($event)" (cancel)="goBack()"></app-blog-form>
  } @else {
    <p class="text-gray-600 text-lg">Loading blog post...</p>
  }
</div>
