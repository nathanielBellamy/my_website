<div class="container mx-auto p-4 bg-white shadow-md rounded-lg">
  <h2 class="text-3xl font-semibold text-gray-800 mb-6">Create New Home Content</h2>
  <form (ngSubmit)="createContent()" class="space-y-4">
    <div>
      <label for="title" class="block text-sm font-medium text-gray-700">Title:</label>
      <input
        id="title"
        [(ngModel)]="homeContent.title"
        name="title"
        required
        class="mt-1 block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-blue-500 focus:border-blue-500 sm:text-sm"
      >
    </div>
    <div>
      <label for="content" class="block text-sm font-medium text-gray-700">Content:</label>
      <textarea
        id="content"
        [(ngModel)]="homeContent.content"
        name="content"
        required
        rows="5"
        class="mt-1 block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-blue-500 focus:border-blue-500 sm:text-sm"
      ></textarea>
    </div>
    <div class="flex space-x-4">
      <button
        type="submit"
        class="px-4 py-2 bg-green-600 text-white rounded-md hover:bg-green-700 transition duration-300"
      >
        Create
      </button>
      <button
        type="button"
        (click)="goBack()"
        class="px-4 py-2 bg-gray-600 text-white rounded-md hover:bg-gray-700 transition duration-300"
      >
        Back to List
      </button>
    </div>
  </form>
</div>
