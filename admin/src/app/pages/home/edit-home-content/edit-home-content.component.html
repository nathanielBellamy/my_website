<div class="container mx-auto p-4 bg-white shadow-md rounded-lg">
  <h2 class="text-3xl font-semibold text-gray-800 mb-6">Edit Home Content</h2>
  @if (homeContent()) {
    <form (ngSubmit)="updateContent()" class="space-y-4">
      <div>
        <label for="title" class="block text-sm font-medium text-gray-700">Title:</label>
        <input
          id="title"
          [(ngModel)]="homeContent()!.title"
          name="title"
          required
          class="mt-1 block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-blue-500 focus:border-blue-500 sm:text-sm"
        >
      </div>
      <div>
        <label for="content" class="block text-sm font-medium text-gray-700">Content:</label>
        <textarea
          id="content"
          [(ngModel)]="homeContent()!.content"
          name="content"
          required
          rows="5"
          class="mt-1 block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-blue-500 focus:border-blue-500 sm:text-sm"
        ></textarea>
      </div>
      <div>
        <label for="activatedAt" class="block text-sm font-medium text-gray-700">Activation Time:</label>
        <input
          type="datetime-local"
          id="activatedAt"
          [(ngModel)]="activatedAtInput"
          name="activatedAt"
          class="mt-1 block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-blue-500 focus:border-blue-500 sm:text-sm"
        >
      </div>
      <div>
        <label for="deactivatedAt" class="block text-sm font-medium text-gray-700">Deactivation Time:</label>
        <input
          type="datetime-local"
          id="deactivatedAt"
          [(ngModel)]="deactivatedAtInput"
          name="deactivatedAt"
          class="mt-1 block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-blue-500 focus:border-blue-500 sm:text-sm"
        >
      </div>
      <div class="flex space-x-4">
        <button
          type="submit"
          class="px-4 py-2 bg-blue-600 text-white rounded-md hover:bg-blue-700 transition duration-300"
        >
          Update
        </button>
        <button
          type="button"
          (click)="goBack()"
          class="px-4 py-2 bg-gray-600 text-white rounded-md hover:bg-gray-700 transition duration-300"
        >
          Back to List
        </button>
      </div>
    </form>
  } @else {
    <p class="text-gray-600 text-lg">Loading home content...</p>
  }
</div>
