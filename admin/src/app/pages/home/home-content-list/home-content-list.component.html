<div class="container mx-auto p-4 bg-white shadow-md rounded-lg">
  <div class="flex justify-between items-center mb-6">
    <h2 class="text-3xl font-semibold text-gray-800">Home Content</h2>
    <a
      routerLink="/home/new"
      class="px-4 py-2 bg-blue-600 text-white rounded-md hover:bg-blue-700 transition duration-300"
    >
      Create New Home Content
    </a>
  </div>

  @if (homeContent().length > 0) {
    <ul class="space-y-4">
      @for (content of homeContent(); track content.id) {
        <li class="bg-gray-50 p-4 rounded-md shadow-sm border border-gray-200">
          <h3 class="text-xl font-medium text-gray-900 mb-2">{{ content.title }}</h3>
          <p class="text-gray-700 mb-4">{{ content.content }}</p>
          <div class="flex space-x-4">
            <a
              [routerLink]="['/home', content.id, 'edit']"
              class="text-blue-600 hover:text-blue-800 transition duration-300"
            >
              Edit
            </a>
            <button
              (click)="deleteContent(content.id)"
              class="text-red-600 hover:text-red-800 transition duration-300 focus:outline-none"
            >
              Delete
            </button>
          </div>
        </li>
      }
    </ul>
  } @else {
    <p class="text-gray-600 text-lg">No home content found.</p>
  }
</div>
