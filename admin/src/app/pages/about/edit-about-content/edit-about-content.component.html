<div class="container mx-auto p-4 bg-white shadow-md rounded-lg">
  @if (aboutContent()) {
    <h2 class="text-3xl font-semibold text-gray-800 mb-6">Edit About Content</h2>
    <app-about-form [contentData]="aboutContent()" (submitForm)="updateContent($event)" (cancel)="goBack()"></app-about-form>
  } @else {
    <p class="text-gray-600 text-lg">Loading About content...</p>
  }
</div>
