<form
  class="space-y-8 divide-y divide-gray-200"
  [formGroup]="form"
  (ngSubmit)="saveForm()">
  <div class="space-y-8 divide-y divide-gray-200">
    <div>
      <div>
        <h3 class="text-lg leading-6 font-medium text-gray-900">
          Groove Jr Content
        </h3>
        <p class="mt-1 text-sm text-gray-500">
          This information will be displayed publicly.
        </p>
      </div>

      <div class="mt-6 grid grid-cols-1 gap-y-6 gap-x-4 sm:grid-cols-6">
        <div class="sm:col-span-4">
          <label for="title" class="block text-sm font-medium text-gray-700">
            Title
          </label>
          <div class="mt-1">
            <input
              type="text"
              id="title"
              formControlName="title"
              class="shadow-sm focus:ring-indigo-500 focus:border-indigo-500 block w-full sm:text-sm border-gray-300 rounded-md" />
          </div>
        </div>

        <div class="sm:col-span-6">
          <label for="content" class="block text-sm font-medium text-gray-700">
            Content
          </label>
          <div class="mt-1 grid grid-cols-1 md:grid-cols-2 gap-4">
            <div>
              <textarea
                id="content"
                formControlName="content"
                rows="10"
                class="shadow-sm focus:ring-indigo-500 focus:border-indigo-500 block w-full sm:text-sm border-gray-300 rounded-md"></textarea>
            </div>
            <div class="prose dark:prose-invert border rounded-md p-2">
              <markdown [data]="form.get('content')?.value"></markdown>
            </div>
          </div>
        </div>

        <div class="sm:col-span-3">
          <label for="activatedAt" class="block text-sm font-medium text-gray-700">
            Activation Time
          </label>
          <div class="mt-1">
            <input
              type="datetime-local"
              id="activatedAt"
              formControlName="activatedAt"
              class="shadow-sm focus:ring-indigo-500 focus:border-indigo-500 block w-full sm:text-sm border-gray-300 rounded-md" />
          </div>
        </div>

        <div class="sm:col-span-3">
          <label for="deactivatedAt" class="block text-sm font-medium text-gray-700">
            Deactivation Time
          </label>
          <div class="mt-1">
            <input
              type="datetime-local"
              id="deactivatedAt"
              formControlName="deactivatedAt"
              class="shadow-sm focus:ring-indigo-500 focus:border-indigo-500 block w-full sm:text-sm border-gray-300 rounded-md" />
          </div>
        </div>
      </div>
    </div>
  </div>

  <div class="pt-5">
    <div class="flex justify-end">
      @if (form.errors?.['dateRangeInvalid']) {
        <p class="text-red-500 text-sm mr-4">
          Deactivation time must be after activation time.
        </p>
      }
      @if (form.invalid && !form.errors?.['dateRangeInvalid']) {
        <p class="text-red-500 text-sm mr-4">
          Please fill out all required fields.
        </p>
      }
      <button
        type="button"
        class="bg-white py-2 px-4 border border-gray-300 rounded-md shadow-sm text-sm font-medium text-gray-700 hover:bg-gray-50 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500">
        Cancel
      </button>
      <button
        type="submit"
        [disabled]="form.invalid"
        class="ml-3 inline-flex justify-center py-2 px-4 border border-transparent shadow-sm text-sm font-medium rounded-md text-white bg-indigo-600 hover:bg-indigo-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500">
        Save
      </button>
    </div>
  </div>
</form>
